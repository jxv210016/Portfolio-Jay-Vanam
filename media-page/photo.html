<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jay Vanam - Photos</title>
    <link rel="stylesheet" href="../styles.css" />
    <link rel="stylesheet" href="photo.css" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/swiper/swiper-bundle.min.css"
    />
  </head>
  <body>
    <header>
      <h1>Jay Vanam</h1>
      <nav>
        <ul>
          <li><a href="../media.html">Home</a></li>
          <li><a href="video.html">Video</a></li>
          <li><a href="photo.html" class="active">Photo</a></li>
          <li><a href="../index.html">Main Site</a></li>
        </ul>
      </nav>
    </header>
    <!-- Swiper container -->
    <div class="swiper-container">
      <!-- Additional required wrapper -->
      <div class="swiper-wrapper">
        <!-- Slides -->
        <div class="swiper-slide">
          <img src="/photos/AMGSET.jpg" alt="AMGSET" />
        </div>
        <!-- The commented image will not be shown -->
        <!-- <div class="swiper-slide"><img src="/photos/BoredShoot.jpg" alt="BoredShoot" /></div> -->
        <div class="swiper-slide">
          <img src="/photos/city.jpg" alt="city" />
        </div>
        <div class="swiper-slide">
          <img src="/photos/CItyset.jpg" alt="CItyset" />
        </div>
        <div class="swiper-slide">
          <img src="/photos/Empire.jpg" alt="Empire" />
        </div>
        <div class="swiper-slide">
          <img src="/photos/IMG_1350.jpg" alt="IMG_1350" />
        </div>
        <div class="swiper-slide">
          <img src="/photos/IMG_1424.jpg" alt="IMG_1424" />
        </div>
        <div class="swiper-slide">
          <img src="/photos/IMG_3770.jpg" alt="IMG_3770" />
        </div>
        <div class="swiper-slide">
          <img src="/photos/IMG_3771.jpg" alt="IMG_3771" />
        </div>
        <div class="swiper-slide">
          <img src="/photos/Must.jpg" alt="Must" />
        </div>
        <div class="swiper-slide">
          <img src="/photos/OldMust.jpg" alt="OldMust" />
        </div>
        <div class="swiper-slide">
          <img src="/photos/RudraCLiff.jpg" alt="RudraCLiff" />
        </div>
        <div class="swiper-slide">
          <img src="/photos/Spring.jpg" alt="Spring" />
        </div>
        <div class="swiper-slide">
          <img src="/photos/TrainCIty.jpg" alt="TrainCIty" />
        </div>
        <div class="swiper-slide">
          <img src="/photos/VITtrees.jpg" alt="VITtrees" />
        </div>
      </div>
      <!-- Navigation buttons -->
      <div class="swiper-button-prev"></div>
      <div class="swiper-button-next"></div>
    </div>

    <!-- Modal for viewing images -->
    <div id="modal" class="modal">
      <span class="close">&times;</span>
      <img id="modal-image" class="modal-content" />
    </div>

    <script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>
    <script src="photo.js"></script>
  </body>
</html>
